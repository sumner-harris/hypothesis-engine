# Modified from the original work.
name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest hypothesis_engine/tests/unit -q
